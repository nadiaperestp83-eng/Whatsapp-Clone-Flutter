name: talk_messenger
description: Talk Messenger - Chat app powered by Supabase and SMSDev.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  emoji_picker_flutter: ^2.2.0
  cached_network_image: ^3.3.1

  # Env / Secrets
  flutter_dotenv: ^5.1.0

  # Auth SMSDev
  http: ^1.2.1

  # Database + Realtime
  supabase_flutter: ^2.5.6

  # Mídia
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  video_player: ^2.8.6
  camera: ^0.11.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Armazenamento local
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Vídeo chamada
  agora_rtc_engine: ^6.3.2

  # Notificações
  flutter_local_notifications: ^17.1.2

  # Contatos
  flutter_contacts: ^1.1.9+2

  # Utilitários
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env

  fonts:
    - family: OpenSans
      fonts:
        - asset: fonts/OpenSans-Bold.ttf
          weight: 700
        - asset: fonts/OpenSans-Regular.ttf
          weight: 400
        - asset: fonts/OpenSans-SemiBold.ttf
          weight: 600
        - asset: fonts/OpenSans-Italic.ttf
          style: italic
